<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>УрФУ Переезд и размещение</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #131925;
      --surface: #1c2433;
      --primary: #4f8cff;
      --secondary: #63d2b3;
      --text: #f2f5fa;
      --muted: #b4c0d8;
      --line: #2e3a52;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    main {
      width: min(520px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    p {
      margin: 12px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }
    a {
      display: block;
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 28px;
      background: var(--primary);
      color: white;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
    }
    small {
      display: block;
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.4;
    }
    .ok {
      color: var(--secondary);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>УрФУ: Переезд и размещение</h1>
    <p>Демо-версия Android-приложения для хакатона: слоты переезда, хранение вещей, поддержка и обращения.</p>
    <a href="./urfu-relocation-demo.apk" download>Скачать APK</a>
    <small><span class="ok">APK подписан.</span> При установке Android может попросить разрешить установку из браузера: это стандартное предупреждение для приложений вне Google Play.</small>
  </main>
</body>
</html>
